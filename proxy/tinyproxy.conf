# ASEticle outbound forward proxy (tinyproxy)
# The backend routes paper-fetching requests (arXiv / Semantic Scholar / SerpApi /
# IEEE / ACM) through this daemon. Deploy it inside a network that can reach
# paywalled venues (e.g. a university network) and point the backend's
# OUTBOUND_PROXY_URL at it.

User tinyproxy
Group tinyproxy

Port 8888
Timeout 600

LogLevel Info
MaxClients 100

# Identify ourselves in the Via header.
ViaProxyName "aseticle-proxy"

# Only accept clients from private networks (the compose network / LAN).
# Tighten these ranges for your deployment if needed.
Allow 127.0.0.1
Allow 10.0.0.0/8
Allow 172.16.0.0/12
Allow 192.168.0.0/16

# Allow HTTPS tunnelling (CONNECT) to the standard TLS ports.
ConnectPort 443
ConnectPort 563
