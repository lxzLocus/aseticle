# Minimal deploy — frontend + backend + db only (no proxy / relay / agent).
# Paper fetching goes straight out (PAPER_FETCH_MODE=direct), so no proxy is needed.
# Pulls prebuilt images from GHCR (no local build).
#
#   cp .env.prod.example .env      # set MYSQL_PASSWORD / JWT_SECRET / ENCRYPTION_KEY
#   docker compose -f docker-compose.min.yml pull
#   docker compose -f docker-compose.min.yml up -d
#
# Only the frontend is published to the host; backend / db stay internal.

services:
  db:
    image: mysql:8.0
    container_name: aseticle-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aseticle}
      MYSQL_USER: ${MYSQL_USER:-aseticle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # App-user over TCP: only healthy once MySQL accepts remote app connections.
      # start_period gives first-run init time (no connection succeeds until init
      # finishes) so the backend waits instead of crash-restarting.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER:-aseticle}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s

  backend:
    image: ${ASETICLE_IMAGE:-ghcr.io/lxzlocus/aseticle}-backend:${TAG:-latest}
    container_name: aseticle-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-aseticle}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-aseticle}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}
      ENV: production
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:49513}
      # No proxy / relay — fetch papers directly.
      PAPER_FETCH_MODE: ${PAPER_FETCH_MODE:-direct}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/api/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${ASETICLE_IMAGE:-ghcr.io/lxzlocus/aseticle}-frontend:${TAG:-latest}
    container_name: aseticle-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-49513}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
