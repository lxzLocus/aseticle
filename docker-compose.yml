services:
  db:
    image: mysql:8.0
    container_name: aseticle-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-aseticle}
      MYSQL_USER: ${MYSQL_USER:-aseticle}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-aseticle}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # App-user over TCP: only healthy once MySQL accepts remote app connections.
      # start_period covers slow first-run init so backend waits, not crash-restarts.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USER:-aseticle}", "-p${MYSQL_PASSWORD:-aseticle}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  proxy:
    build:
      context: ./proxy
    container_name: aseticle-proxy
    restart: unless-stopped
    # No host port needed — only the backend reaches it over the compose network.
    expose:
      - "8888"

  # --- Phone-home relay + agent (opt-in via `--profile relay`) ---
  # For a restricted network where you cannot open inbound ports. In production
  # the relay runs on a public/reachable host and the agent runs inside the
  # restricted network; both are addressed purely by env (URL + tokens), so they
  # can also be reached over a Tailscale mesh.
  relay:
    build:
      context: ./relay
    container_name: aseticle-relay
    restart: unless-stopped
    profiles: ["relay"]
    environment:
      RELAY_CLIENT_TOKEN: ${RELAY_CLIENT_TOKEN:-dev-client-token}
      RELAY_AGENT_TOKEN: ${RELAY_AGENT_TOKEN:-dev-agent-token}
    ports:
      - "${RELAY_PORT:-8090}:8080"

  agent:
    build:
      context: ./agent
    container_name: aseticle-agent
    restart: unless-stopped
    profiles: ["relay"]
    depends_on:
      relay:
        condition: service_healthy
    environment:
      RELAY_URL: ${AGENT_RELAY_URL:-http://relay:8080}
      RELAY_AGENT_TOKEN: ${RELAY_AGENT_TOKEN:-dev-agent-token}
      # Optionally have the agent egress via a local upstream proxy:
      AGENT_UPSTREAM_PROXY: ${AGENT_UPSTREAM_PROXY:-}

  backend:
    build:
      context: ./backend
    container_name: aseticle-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-aseticle}:${MYSQL_PASSWORD:-aseticle}@db:3306/${MYSQL_DATABASE:-aseticle}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:49513,http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      ENV: ${ENV:-development}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      # Paper-fetch egress. mode: auto|direct|proxy|relay
      PAPER_FETCH_MODE: ${PAPER_FETCH_MODE:-auto}
      # proxy mode: forward proxy (tinyproxy; reachable directly or over Tailscale)
      OUTBOUND_PROXY_URL: ${OUTBOUND_PROXY_URL:-http://proxy:8888}
      # relay mode: phone-home relay (agent daemon in a restricted network)
      RELAY_URL: ${RELAY_URL:-}
      RELAY_CLIENT_TOKEN: ${RELAY_CLIENT_TOKEN:-}
      RELAY_FALLBACK_DIRECT: ${RELAY_FALLBACK_DIRECT:-false}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        API_PROXY_TARGET: http://backend:8080
    container_name: aseticle-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # server-side: Next.js rewrites proxy /api -> backend over the compose network
      API_PROXY_TARGET: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-49513}:3000"

volumes:
  db_data:
